name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crawler
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" httpx selectolax trafilatura \
            asyncpg pydantic pydantic-settings tenacity prometheus-client \
            pytest pytest-asyncio ruff
      - name: Lint
        run: ruff check app tests
      - name: Test (unit)
        run: pytest -q
      - name: Test (integration, live Postgres)
        env:
          RUN_DB_TESTS: "1"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crawler
        run: pytest -q tests/test_integration_db.py

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          CRAWLER_API_URL: http://localhost:8000
